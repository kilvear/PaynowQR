<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayNow QR Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>PayNow QR Generator</h1>
      <p class="lead">Enter the payment details below to create a scannable PayNow QR code.</p>
    </header>

    <form id="qr-form" novalidate>
      <div class="field">
        <label for="proxyValue">UEN</label>
        <input id="proxyValue" name="proxyValue" autocomplete="off" required placeholder="e.g. 201403121W" />
        <small class="hint">Company UEN registered with PayNow.</small>
      </div>

      <div class="field">
        <label for="amount">Amount (SGD)</label>
        <input id="amount" name="amount" type="number" step="0.01" min="0" placeholder="Leave blank for payer-decided" />
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="editable" name="editable" />
        <label for="editable">Allow payer to change amount</label>
      </div>

      <div class="field">
        <label for="company">Company Name</label>
        <input id="company" name="company" placeholder="Optional label shown to payer" />
      </div>

      <div class="field">
        <label for="refNumber">Reference Number</label>
        <input id="refNumber" name="refNumber" placeholder="Optional invoice / reference" />
      </div>

      <div class="field">
        <label for="expiry">Expiry Date</label>
        <input id="expiry" name="expiry" type="date" />
      </div>

      <fieldset class="field logo-field">
        <legend>Logo (optional)</legend>
        <input id="logo" name="logo" type="file" accept="image/*" />
        <div class="logo-actions">
          <button type="button" id="logoRemove" class="secondary" disabled>Remove Logo</button>
          <span id="logoStatus" class="hint">PNG/JPEG/SVG up to 200 KB. Auto-centered with safe padding.</span>
        </div>
      </fieldset>

      <div class="actions">
        <button type="submit">Generate QR</button>
        <button type="button" id="clearBtn" class="secondary">Clear</button>
      </div>

      <p class="error" id="error" role="alert" hidden></p>
    </form>

    <section id="output" class="output hidden">
      <h2>QR Preview</h2>
      <div id="qr"></div>

      <label for="payload">Payload String</label>
      <textarea id="payload" readonly rows="4"></textarea>

      <div class="download-actions">
        <a id="downloadSvg" class="button-link secondary" role="button" aria-disabled="true">Download SVG</a>
      </div>
    </section>
  </main>

  <script src="vendor/paynowqr.umd.js"></script>
  <script src="vendor/qrcode.js"></script>
  <script src="main.js"></script>
</body>
</html>
